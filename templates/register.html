<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DorkNet CryptoVault - Inscription</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0b0e14; color: #00ff41; font-family: 'Courier New', Courier, monospace; }
        .card { background-color: #161b22; border: 1px solid #00ff41; border-radius: 0; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        .form-control { background-color: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 0; }
        .form-control:focus { background-color: #0d1117; border-color: #00ff41; color: #fff; box-shadow: 0 0 5px #00ff41; }
        .btn-primary { background-color: #238636; border: none; border-radius: 0; font-weight: bold; }
        .btn-primary:hover { background-color: #2ea043; }
        .vault-header { border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
        .status-dot { height: 10px; width: 10px; background-color: #00ff41; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="vault-header">
                        <h3 class="text-center"><span class="status-dot"></span>DorkNet CryptoVault</h3>
                        <p class="text-center small text-secondary">Initialisation de l'accès sécurisé</p>
                    </div>
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                          <div class="alert alert-{{ category }} bg-dark text-{{ 'success' if category == 'success' else 'danger' }} border-0 small py-1">{{ message }}</div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Identifiant Agent</label>
                            <input type="text" name="username" class="form-control" placeholder="Enoch_dorknet" required autocomplete="off">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Clé Maîtresse (Password)</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Code PIN (Double Authentification)</label>
                            <input type="password" name="pin" class="form-control" maxlength="8" placeholder="****" required>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">GÉNÉRER L'ACCÈS AU COFFRE</button>
                        </div>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="{{ url_for('index') }}" class="text-decoration-none small text-secondary">> Accéder au Terminal de Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
