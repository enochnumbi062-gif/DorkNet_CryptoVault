<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DorkNet CryptoVault - Inscription Bastion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0b0e14; color: #00ff41; font-family: 'Courier New', Courier, monospace; }
        .card { background-color: #161b22; border: 1px solid #00ff41; border-radius: 0; }
        .form-control { background-color: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 0; }
        .form-control:focus { background-color: #0d1117; border-color: #00ff41; color: #fff; box-shadow: none; }
        .btn-primary { background-color: #238636; border: none; border-radius: 0; }
        .btn-primary:hover { background-color: #2ea043; }
        .terminal-header { border-bottom: 1px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-lg">
                    <div class="terminal-header">
                        <h3 class="text-center">RECRUTEMENT_AGENT_DORKNET</h3>
                        <p class="text-center small">[ Accès au Bastion Xchange ]</p>
                    </div>
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                          <div class="alert alert-{{ category }} small py-1">{{ message }}</div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Identifiant (Username)</label>
                            <input type="text" name="username" class="form-control" placeholder="ex: Enoch_dorknet" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Clé d'Accès (Password)</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Code PIN (Sécurité 2FA)</label>
                            <input type="password" name="pin" class="form-control" maxlength="6" placeholder="数字 - 6 chiffres" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">GÉNÉRER L'ACCÈS</button>
                        </div>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="{{ url_for('index') }}" class="text-decoration-none small text-secondary">> Retour au Terminal Principal</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
